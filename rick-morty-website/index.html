<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rick and Morty Explorer</title>
    <link rel="stylesheet" href="src/style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>

    <div id="loading-screen" class="loading-screen">
      <div class="portal-spin">
        <i class="fas fa-circle-notch fa-spin"></i>
        <span>Opening portal ...</span>
      </div>
    </div>
   

    <header class="portal-header">
      <div class="header-content">
        <h1 class="portal-title">
          <i class="fas fa-meteor"></i>
          Rick and Morty
        </h1>
        <div class="controls">
          <button id="theme-toggle" class="theme-btn" title="Toggle Theme">
            <i class="fas fa-moon"></i>
          </button>
          <button id="survival-kit-btn" class="survival-kit-btn" title="Survival Kit">
            <i class="fas fa-heart"></i>
            <span id="favorites-count">0</span>
          </button>
        </div>
      </div>
    </header>

  <section class="controls-panel">
      <div class="portal-gun-search">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Portal Gun Search ... (name, species, status)">
    </div>

    <small id="search-error" style="color: #ff6b6b;display: none;padding-left:1rem">
      Type at least 2 characters to search ! 
    </small>

  <div class="filters">
    <select id="status-filters">
      <option value="">All Status</option>
      <option value="Alive"> Alive</option>
      <option value="Dead"> Dead</option>
      <option value="unknown"> Unknown</option>
    </select>
  
    <select id="species-filter">
      <option value=""> All Species</option>
      <option value="Human">Human</option>
      <option value="Alien"> Alien</option>
      <option value="Robot"> Robot</option>
    </select>

    <select id="gender-filter">
      <option value="">All Gender</option>
      <option value="Male"> Male</option>
      <option value="Female">Female</option>
      <option value="unknown">Unknown</option>
    </select>
  </div>

  <div class="sort-controls">
    <select id="sort-select">
      <option value="name">Name </option>
      <option value="status">Status </option>
      <option value="species">Species </option>
    </select>
  <button id="clear-filters" class="clear-btn">
    <i class="fas fa-times"></i> Clear
  </button>
  </div>
  </section>


  <section class="stats-grid">
    <div class="stat-card">
      <i class="fas fa-users"></i>
      <span id="total-characters">-</span> Characters
    </div>
  <div class="stat-card alive"> 
    <i class="fas fa-heartbeat"></i>
    <span id="alive-count">-</span> Alive
  </div>
  <div class="stat-card dead">
    <i class="fas fa-skull"></i>
    <span id="dead-count">-</span> Dead
  </div>
  </section>


  <main id="characters-grid" class="characters-grid"></main>

  <div id="survival-kit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
      <h2><i class="fas fa-briefcase"></i> Survival Kit</h2>
      <button id="close-modal" class="close-btn">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div id="favorites-list" class="favorites-list"> 
      <p>No favorites yet. Scan some characters!</p>
    </div>
    </div>
  </div>

  <div id="detail-modal" class="modal"></div>

 <script type="module" src="/src/main.js"></script>
  </body>
</html>
